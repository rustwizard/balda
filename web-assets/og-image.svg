<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f5f0"/>
      <stop offset="100%" stop-color="#e8e6df"/>
    </linearGradient>
    <linearGradient id="tileGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3e9d8"/>
      <stop offset="100%" stop-color="#e6d5b8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Decorative board tiles in background -->
  <g opacity="0.25">
    <rect x="80" y="80" width="80" height="80" rx="16" fill="#e0ddd5"/>
    <rect x="180" y="80" width="80" height="80" rx="16" fill="#e0ddd5"/>
    <rect x="280" y="80" width="80" height="80" rx="16" fill="url(#tileGrad)" filter="url(#shadow)"/>
    <text x="320" y="138" font-family="Segoe UI, Roboto, sans-serif" font-size="48" font-weight="800" fill="#2c2c2c" text-anchor="middle">Б</text>
    
    <rect x="80" y="180" width="80" height="80" rx="16" fill="#e0ddd5"/>
    <rect x="180" y="180" width="80" height="80" rx="16" fill="url(#tileGrad)" filter="url(#shadow)"/>
    <text x="220" y="238" font-family="Segoe UI, Roboto, sans-serif" font-size="48" font-weight="800" fill="#2c2c2c" text-anchor="middle">А</text>
    <rect x="280" y="180" width="80" height="80" rx="16" fill="#e0ddd5"/>
  </g>
  
  <!-- Main title tiles -->
  <g transform="translate(420, 220)">
    <rect x="0" y="0" width="100" height="120" rx="20" fill="url(#tileGrad)" filter="url(#shadow)"/>
    <text x="50" y="82" font-family="Segoe UI, Roboto, sans-serif" font-size="64" font-weight="800" fill="#2c2c2c" text-anchor="middle">Б</text>
    
    <rect x="120" y="0" width="100" height="120" rx="20" fill="url(#tileGrad)" filter="url(#shadow)"/>
    <text x="170" y="82" font-family="Segoe UI, Roboto, sans-serif" font-size="64" font-weight="800" fill="#2c2c2c" text-anchor="middle">А</text>
    
    <rect x="240" y="0" width="100" height="120" rx="20" fill="url(#tileGrad)" filter="url(#shadow)"/>
    <text x="290" y="82" font-family="Segoe UI, Roboto, sans-serif" font-size="64" font-weight="800" fill="#2c2c2c" text-anchor="middle">Л</text>
    
    <rect x="360" y="0" width="100" height="120" rx="20" fill="url(#tileGrad)" filter="url(#shadow)"/>
    <text x="410" y="82" font-family="Segoe UI, Roboto, sans-serif" font-size="64" font-weight="800" fill="#2c2c2c" text-anchor="middle">Д</text>
    
    <rect x="480" y="0" width="100" height="120" rx="20" fill="url(#tileGrad)" filter="url(#shadow)"/>
    <text x="530" y="82" font-family="Segoe UI, Roboto, sans-serif" font-size="64" font-weight="800" fill="#2c2c2c" text-anchor="middle">А</text>
  </g>
  
  <!-- Subtitle -->
  <text x="600" y="420" font-family="Segoe UI, Roboto, sans-serif" font-size="36" font-weight="500" fill="#5a5a5a" text-anchor="middle">Мультиплеерная словесная игра</text>
  
  <!-- URL -->
  <text x="600" y="540" font-family="Segoe UI, Roboto, sans-serif" font-size="24" font-weight="600" fill="#888" text-anchor="middle">playbalda.example.com</text>
</svg>
