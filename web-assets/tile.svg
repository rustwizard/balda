<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3e9d8"/>
      <stop offset="100%" stop-color="#e6d5b8"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect x="4" y="4" width="56" height="56" rx="12" fill="url(#bg)" filter="url(#sh)"/>
  <!-- subtle inner highlight -->
  <rect x="8" y="8" width="48" height="48" rx="10" fill="none" stroke="#fff" stroke-opacity="0.35" stroke-width="2"/>
</svg>
