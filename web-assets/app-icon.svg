<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f5f0"/>
      <stop offset="100%" stop-color="#e8e6df"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3e9d8"/>
      <stop offset="100%" stop-color="#e6d5b8"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  
  <!-- Main tile -->
  <rect x="96" y="96" width="320" height="320" rx="48" fill="url(#tile)" filter="url(#sh)"/>
  
  <!-- Inner highlight -->
  <rect x="116" y="116" width="280" height="280" rx="40" fill="none" stroke="#fff" stroke-opacity="0.4" stroke-width="8"/>
  
  <!-- Letter B -->
  <text x="256" y="360" font-family="Segoe UI, Roboto, sans-serif" font-size="220" font-weight="800" fill="#2c2c2c" text-anchor="middle">Б</text>
</svg>
