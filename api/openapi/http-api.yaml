openapi: "3.0.3"
info:
  title: Balda GameServer
  description: |
    Balda GameServer API methods and models

    ### Headers
    | Header | Description |
    |--------|-------------|
    | **X-API-Key** | API key is a special token that the client needs to provide when making API calls. |
    | **X-API-User** | User's ID |
    | **X-API-Session** | Session ID |
  version: 1.0.0

servers:
  - url: http://127.0.0.1:9666/balda/api/v1

paths:
  /signup:
    post:
      operationId: signup
      summary: Sign-up request
      tags:
        - Signup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "200":
          description: Response for signup request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignupResponse"
        "400":
          description: Error when signup
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth:
    post:
      operationId: auth
      summary: Auth request
      tags:
        - Auth
      security:
        - APIKeyHeader: []
        - APIKeyQueryParam: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRequest"
      responses:
        "200":
          description: Response for auth request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Error when auth
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /session/ping:
    post:
      operationId: ping
      tags: [Session]
      summary: Keepalive ping
      description: |
        POST not GET — mutates session TTL.
        Returns 204 with X-Server-Time header instead of a JSON body
        to minimize bandwidth on frequent pings (every ping_delay ms).
      security:
        - APIKeyHeader: []
        - APIKeyQueryParam: []
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/ApiSessionHeader'
      responses:
        '204':
          description: Session alive.
          headers:
            X-Server-Time:
              $ref: '#/components/headers/X-Server-Time'
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /games:
    post:
      operationId: createGame
      summary: Create a new game
      tags:
        - Games
      security:
        - APIKeyHeader: []
        - APIKeyQueryParam: []
      parameters:
        - $ref: '#/components/parameters/ApiSessionHeader'
      responses:
        "200":
          description: Game created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateGameResponse"
        "401":
          $ref: '#/components/responses/Unauthorized'
    get:
      operationId: listGames
      summary: List active games
      description: Returns a snapshot of all currently active games.
      tags:
        - Games
      security:
        - APIKeyHeader: []
        - APIKeyQueryParam: []
      parameters:
        - $ref: '#/components/parameters/ApiSessionHeader'
      responses:
        "200":
          description: List of active games
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListGamesResponse"
        "401":
          $ref: '#/components/responses/Unauthorized'

  /games/{id}/join:
    post:
      operationId: joinGame
      summary: Join an existing waiting game
      description: |
        Adds the authenticated player to the specified waiting game.
        When the second player joins (quorum of 2 is reached) the game
        transitions to in_progress and the first move belongs to the
        player who created the game.
      tags:
        - Games
      security:
        - APIKeyHeader: []
        - APIKeyQueryParam: []
      parameters:
        - $ref: '#/components/parameters/ApiSessionHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID of the game to join
      responses:
        "200":
          description: Successfully joined; game is now in_progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JoinGameResponse"
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          description: Game not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Cannot join (player already in a game, game not waiting, or game is full)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /games/{id}/move:
    post:
      operationId: moveGame
      summary: Submit a move
      description: |
        Places a new letter on the board and submits a word. If the word is valid,
        the player's score is updated and the turn passes to the opponent.
      tags:
        - Games
      security:
        - APIKeyHeader: []
        - APIKeyQueryParam: []
      parameters:
        - $ref: '#/components/parameters/ApiSessionHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID of the game
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveRequest"
      responses:
        "200":
          description: Move accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoveResponse"
        "400":
          description: Invalid move (bad word placement, word not in dictionary, etc.)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          description: Game not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Not the player's turn or game not in progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /games/{id}/propose-end:
    post:
      operationId: proposeEndGame
      summary: Propose to end the game
      description: |
        The current player proposes to end the game (e.g. no valid moves are available).
        The turn timer is paused until the opponent responds.
        Only the player whose turn it currently is may call this.
      tags:
        - Games
      security:
        - APIKeyHeader: []
        - APIKeyQueryParam: []
      parameters:
        - $ref: '#/components/parameters/ApiSessionHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID of the game
      responses:
        "204":
          description: Proposal sent successfully; waiting for opponent's response
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          description: Game not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Not the player's turn, game not in progress, or proposal already pending
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /games/{id}/accept-end:
    post:
      operationId: acceptEndGame
      summary: Accept the opponent's end-game proposal
      description: |
        The opponent accepts the end-game proposal. The game ends immediately with
        the current scores. Only the non-proposing player may call this.
      tags:
        - Games
      security:
        - APIKeyHeader: []
        - APIKeyQueryParam: []
      parameters:
        - $ref: '#/components/parameters/ApiSessionHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID of the game
      responses:
        "204":
          description: Proposal accepted; game is now over
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          description: Game not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: No end proposal is pending or player is not the opponent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /games/{id}/reject-end:
    post:
      operationId: rejectEndGame
      summary: Reject the opponent's end-game proposal
      description: |
        The opponent rejects the end-game proposal. The game resumes with the
        remaining turn time (minimum 10 seconds). Only the non-proposing player may call this.
      tags:
        - Games
      security:
        - APIKeyHeader: []
        - APIKeyQueryParam: []
      parameters:
        - $ref: '#/components/parameters/ApiSessionHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID of the game
      responses:
        "204":
          description: Proposal rejected; game continues
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          description: Game not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: No end proposal is pending or player is not the opponent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /games/{id}/skip:
    post:
      operationId: skipGame
      summary: Skip turn
      description: |
        Ends the current turn without making a move. The turn passes to the opponent.
      tags:
        - Games
      security:
        - APIKeyHeader: []
        - APIKeyQueryParam: []
      parameters:
        - $ref: '#/components/parameters/ApiSessionHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID of the game
      responses:
        "204":
          description: Turn skipped successfully
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          description: Game not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Not the player's turn or game not in progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /player/state/{uid}:
    get:
      operationId: getPlayerStateUID
      summary: Get user state
      parameters:
        - name: uid
          in: path
          description: Player ID
          required: true
          schema:
            type: string
            format: uuid
            description: The unique identifier of the player
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerState"
        "400":
          description: Error when get player state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    APIKeyHeader:
      type: apiKey
      in: header
      name: X-API-Key
    APIKeyQueryParam:
      type: apiKey
      in: query
      name: api_key

  responses:
    Unauthorized:
      description: Missing or invalid credentials.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: 401
            message: "Session required"
            type: "Unauthorized"

  schemas:
    Error:
      type: object
      properties:
        code:
          description: Error code
          type: integer
        message:
          description: Human-readable error message
          type: string

    ErrorResponse:
      type: object
      properties:
        status:
          description: the HTTP response code
          example: 401
          type: integer
        message:
          description: a human-readable explanation of the error
          example: Bad Authentication data.
          type: string
        type:
          description: Type of the error message
          example: OAuthException
          type: string

    SignupRequest:
      type: object
      required:
        - firstname
        - lastname
        - email
        - password
      properties:
        firstname:
          description: User's first name
          example: John
          type: string
        lastname:
          description: User's last name
          example: Smith
          type: string
        email:
          description: User's email
          example: js@example.org
          type: string
          format: email
        password:
          description: User's password
          example: some_password
          type: string

    SignupResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/Player"
        centrifugo_token:
          description: JWT for connecting to the Centrifugo WebSocket
          type: string
        lobby_token:
          description: Centrifugo subscription JWT for the lobby channel
          type: string

    Player:
      type: object
      properties:
        uid:
          description: Player's ID in the system
          type: string
          format: uuid
        firstname:
          description: Player's first name
          example: John
          type: string
        lastname:
          description: Player's last name
          example: Smith
          type: string
        sid:
          description: Player's session ID
          example: 6c160004-35c8-45b1-a4da-0ab67076afde
          type: string
        key:
          description: Player's API Key that the client needs to provide when making API calls.
          example: some_api_key
          type: string
        exp:
          description: Player's total EXP
          type: integer
          format: int64

    AuthRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          description: User's email
          example: js@example.org
          type: string
        password:
          description: User's password
          example: some_password
          type: string

    AuthResponse:
      type: object
      properties:
        player:
          $ref: "#/components/schemas/Player"
        centrifugo_token:
          description: JWT for connecting to the Centrifugo WebSocket
          type: string
        lobby_token:
          description: Centrifugo subscription JWT for the lobby channel
          type: string

    GameStatus:
      type: string
      enum:
        - waiting
        - in_progress
        - finished
      description: Current state of the game

    LobbyPlayer:
      type: object
      properties:
        uid:
          description: Player's ID
          type: string
          format: uuid
        exp:
          description: Player's total EXP
          type: integer
          format: int64

    GameSummary:
      type: object
      properties:
        id:
          description: Game ID
          type: string
          format: uuid
          example: "144e8a2b-3c1d-4e5f-a6b7-8c9d0e1f2a3b"
        player_ids:
          description: IDs of players participating in the game
          type: array
          items:
            type: string
            format: uuid
        players:
          description: Players with EXP info
          type: array
          items:
            $ref: "#/components/schemas/LobbyPlayer"
        status:
          $ref: "#/components/schemas/GameStatus"
        started_at:
          description: When the game was started (Unix timestamp in milliseconds)
          type: integer
          format: int64
          example: 1712600000000

    CreateGameResponse:
      type: object
      properties:
        game:
          $ref: "#/components/schemas/GameSummary"
        game_token:
          description: Centrifugo subscription JWT for the game channel
          type: string

    ListGamesResponse:
      type: object
      properties:
        games:
          type: array
          items:
            $ref: "#/components/schemas/GameSummary"

    JoinGameResponse:
      type: object
      properties:
        game:
          $ref: "#/components/schemas/GameSummary"
        game_token:
          description: Centrifugo subscription JWT for the game channel
          type: string
        board:
          description: |
            Initial 5x5 board state. Each row is an array of 5 single-character strings
            (empty string means empty cell). Included so the joining player can render
            the board immediately without waiting for the Centrifugo game_state event.
          type: array
          items:
            type: array
            items:
              type: string
        current_turn_uid:
          description: ID of the player whose turn it is first (the game creator)
          type: string

    BoardCell:
      type: object
      required:
        - row
        - col
      properties:
        row:
          type: integer
          minimum: 0
          maximum: 4
        col:
          type: integer
          minimum: 0
          maximum: 4

    MoveRequest:
      type: object
      required:
        - new_letter
        - word_path
      properties:
        new_letter:
          type: object
          required:
            - row
            - col
            - char
          properties:
            row:
              type: integer
              minimum: 0
              maximum: 4
            col:
              type: integer
              minimum: 0
              maximum: 4
            char:
              type: string
              maxLength: 1
              description: Single Cyrillic letter to place
        word_path:
          type: array
          minItems: 2
          items:
            $ref: "#/components/schemas/BoardCell"

    MoveResponse:
      type: object
      properties:
        board:
          description: Updated 5x5 board state
          type: array
          items:
            type: array
            items:
              type: string
              maxLength: 1
        current_turn_uid:
          description: ID of the player whose turn it is now
          type: string
          format: uuid
        players:
          type: array
          items:
            $ref: "#/components/schemas/PlayerGameState"
        status:
          $ref: "#/components/schemas/GameStatus"
        move_number:
          type: integer

    PlayerGameState:
      type: object
      properties:
        uid:
          description: Player's ID
          type: string
          format: uuid
        exp:
          description: Player's total EXP at the time of the event
          type: integer
          format: int64
        score:
          description: Number of points scored in the current game
          type: integer
        words_count:
          description: Number of words submitted by the player
          type: integer
        words:
          description: List of words submitted by the player in this game
          type: array
          items:
            type: string

    EvGameCreated:
      type: object
      description: Published to the lobby channel when a new game is created
      properties:
        type:
          type: string
          enum: [game_created]
        game:
          $ref: "#/components/schemas/GameSummary"

    EvGameStarted:
      type: object
      description: Published to lobby and game:{id} channels when the second player joins
      properties:
        type:
          type: string
          enum: [game_started]
        game:
          $ref: "#/components/schemas/GameSummary"

    EvGameState:
      type: object
      description: |
        Full game snapshot. Published to game:{id} at game start and after every move.
        board is a 5x5 grid represented as an array of 5 rows, each row is an array of
        5 single-character strings (empty string means the cell is empty).
      properties:
        type:
          type: string
          enum: [game_state]
        game_id:
          type: string
          format: uuid
        board:
          type: array
          minItems: 5
          maxItems: 5
          items:
            type: array
            minItems: 5
            maxItems: 5
            items:
              type: string
              maxLength: 1
        current_turn_uid:
          description: ID of the player whose turn it is
          type: string
          format: uuid
        players:
          type: array
          items:
            $ref: "#/components/schemas/PlayerGameState"
        status:
          $ref: "#/components/schemas/GameStatus"
        move_number:
          description: Number of moves made so far (0 at game start)
          type: integer

    EvGameOver:
      type: object
      description: Published to game:{id} when the game ends
      properties:
        type:
          type: string
          enum: [game_over]
        game_id:
          type: string
          format: uuid
        winner_uid:
          description: ID of the winner, absent if the game ended in a draw
          type: string
          format: uuid
          nullable: true
        players:
          type: array
          items:
            $ref: "#/components/schemas/PlayerGameState"

    EvEndProposal:
      type: object
      description: Published to game:{id} when the current player proposes to end the game
      properties:
        type:
          type: string
          enum: [end_proposal]
        game_id:
          type: string
          format: uuid
        proposer_uid:
          description: ID of the player who proposed to end
          type: string
          format: uuid

    EvEndProposalResult:
      type: object
      description: Published to game:{id} when the opponent responds to the end proposal
      properties:
        type:
          type: string
          enum: [end_proposal_result]
        game_id:
          type: string
          format: uuid
        accepted:
          type: boolean
        remaining_ms:
          description: Remaining turn time in milliseconds (only present when accepted=false)
          type: integer
          format: int64

    PlayerState:
      type: object
      properties:
        uid:
          description: Player's ID in the system
          type: string
          format: uuid
        nickname:
          description: Generated nickname in the system
          example: JohnSmith
          type: string
        exp:
          description: Player's exp points in the system
          example: 100
          type: integer
          format: int64
        lives:
          description: Player's lives count in the system
          example: 3
          type: integer
          format: int64
        flags:
          description: Some Player's flags.
          example: 10
          type: integer
          format: int64
        game_id:
          description: Game's ID (if game_id empty or absent then player in the lobby)
          example: 144
          type: string
          format: uuid
          
  headers:
    X-Request-ID:
      description: Monotonically increasing client sequence number.
      schema:
        type: integer
        minimum: 1
        format: int64
    X-Server-Time:
      description: Server Unix timestamp in milliseconds.
      schema:
        type: integer
        format: int64
    Retry-After:
      description: Seconds until the rate-limited or cooled-down action may be retried.
      schema:
        type: integer
    ETag:
      description: Entity tag for conditional GET caching.
      schema:
        type: string
    Cache-Control:
      description: Cache directive.
      schema:
        type: string
    X-RateLimit-Limit:
      description: Maximum requests allowed in the current window.
      schema:
        type: integer
    X-RateLimit-Remaining:
      description: Requests remaining in the current window.
      schema:
        type: integer
    X-RateLimit-Reset:
      description: When the current rate-limit window resets (ISO 8601).
      schema:
        type: string
        format: date-time

  parameters:
    RequestIdHeader:
      in: header
      name: X-Request-ID
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    ApiSessionHeader:
      in: header
      name: X-API-Session
      required: true
      schema:
        type: string
