<svg xmlns="http://www.w3.org/2000/svg" width="470" height="470" viewBox="0 0 470 470">
  <defs>
    <linearGradient id="tileGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3e9d8"/>
      <stop offset="100%" stop-color="#e6d5b8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="2" flood-color="#c9b896" flood-opacity="0.8"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="450" height="450" rx="20" fill="#e0ddd5"/>

  <!-- All cells filled -->
  <g font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="36" font-weight="700" fill="#2c2c2c" text-anchor="middle">
    <!-- row 0 -->
    <rect x="15" y="15" width="80" height="80" rx="14" fill="url(#tileGrad)" filter="url(#shadow)"/><text x="55" y="70">П</text>
    <rect x="105" y="15" width="80" height="80" rx="14" fill="url(#tileGrad)" filter="url(#shadow)"/><text x="145" y="70">А</text>
    <rect x="195" y="15" width="80" height="80" rx="14" fill="url(#tileGrad)" filter="url(#shadow)"/><text x="235" y="70">Р</text>
    <rect x="285" y="15" width="80" height="80" rx="14" fill="url(#tileGrad)" filter="url(#shadow)"/><text x="325" y="70">К</text>
    <rect x="375" y="15" width="80" height="80" rx="14" fill="url(#tileGrad)" filter="url(#shadow)"/><text x="415" y="70">И</text>

    <!-- row 1 -->
    <rect x="15" y="105" width="80" height="80" rx="14" fill="url(#tileGrad)" filter="url(#shadow)"/><text x="55" y="160">А</text>
    <rect x="105" y="105" width="80" height="80" rx="14" fill="url(#tileGrad)" filter="url(#shadow)"/><text x="145" y="160">В</text>
    <rect x="195" y="105" width="80" height="80" rx="14" fill="url(#tileGrad)" filter="url(#shadow)"/><text x="235" y="160">Т</text>
    <rect x="285" y="105" width="80" height="80" rx="14" fill="url(#tileGrad)" filter="url(#shadow)"/><text x="325" y="160">О</text>
    <rect x="375" y="105" width="80" height="80" rx="14" fill="url(#tileGrad)" filter="url(#shadow)"/><text x="415" y="160">Р</text>

    <!-- row 2 -->
    <rect x="15" y="195" width="80" height="80" rx="14" fill="url(#tileGrad)" filter="url(#shadow)"/><text x="55" y="250">С</text>
    <rect x="105" y="195" width="80" height="80" rx="14" fill="url(#tileGrad)" filter="url(#shadow)"/><text x="145" y="250">Л</text>
    <rect x="195" y="195" width="80" height="80" rx="14" fill="url(#tileGrad)" filter="url(#shadow)"/><text x="235" y="250">О</text>
    <rect x="285" y="195" width="80" height="80" rx="14" fill="url(#tileGrad)" filter="url(#shadow)"/><text x="325" y="250">В</text>
    <rect x="375" y="195" width="80" height="80" rx="14" fill="url(#tileGrad)" filter="url(#shadow)"/><text x="415" y="250">О</text>

    <!-- row 3 -->
    <rect x="15" y="285" width="80" height="80" rx="14" fill="url(#tileGrad)" filter="url(#shadow)"/><text x="55" y="340">М</text>
    <rect x="105" y="285" width="80" height="80" rx="14" fill="url(#tileGrad)" filter="url(#shadow)"/><text x="145" y="340">Е</text>
    <rect x="195" y="285" width="80" height="80" rx="14" fill="url(#tileGrad)" filter="url(#shadow)"/><text x="235" y="340">Т</text>
    <rect x="285" y="285" width="80" height="80" rx="14" fill="url(#tileGrad)" filter="url(#shadow)"/><text x="325" y="340">Р</text>
    <rect x="375" y="285" width="80" height="80" rx="14" fill="url(#tileGrad)" filter="url(#shadow)"/><text x="415" y="340">О</text>

    <!-- row 4 -->
    <rect x="15" y="375" width="80" height="80" rx="14" fill="url(#tileGrad)" filter="url(#shadow)"/><text x="55" y="430">Д</text>
    <rect x="105" y="375" width="80" height="80" rx="14" fill="url(#tileGrad)" filter="url(#shadow)"/><text x="145" y="430">О</text>
    <rect x="195" y="375" width="80" height="80" rx="14" fill="url(#tileGrad)" filter="url(#shadow)"/><text x="235" y="430">М</text>
    <rect x="285" y="375" width="80" height="80" rx="14" fill="url(#tileGrad)" filter="url(#shadow)"/><text x="325" y="430">А</text>
    <rect x="375" y="375" width="80" height="80" rx="14" fill="url(#tileGrad)" filter="url(#shadow)"/><text x="415" y="430">Й</text>
  </g>
</svg>