services:
  frontend:
    image: rustwizard/balda-frontend
    build:
      context: ./frontend
      dockerfile: ./Dockerfile
    ports:
      - "8080:80"
    depends_on:
      server:
        condition: service_started
      centrifugo:
        condition: service_started

  server:
    image: rustwizard/balda-server
    build:
      context: .
      dockerfile: ./build/Dockerfile
    ports:
      - "127.0.0.1:9666:9666"
    environment:
      SERVER_ADDR: 0.0.0.0
      SERVER_PORT: 9666
      SERVER_X_API_TOKEN: abcdefuvwxyz
      PG_HOST: pg
      PG_USER: balda
      PG_DATABASE: balda
      PG_PASSWORD: balda
      PG_MAX_POOL_SIZE: 100
      REDIS_ADDR: redis:6379
      MIGRATION_CONN_STRING: postgres://balda:balda@pg:5432/balda?sslmode=disable
      CENTRIFUGO_API_URL: http://centrifugo:8000/api
      CENTRIFUGO_API_KEY: balda-centrifugo-api-key
      CENTRIFUGO_TOKEN_HMAC_SECRET_KEY: balda-centrifugo-secret
    command: ["server"]
    depends_on:
      pg:
        condition: service_healthy
      centrifugo:
        condition: service_started

  pg:
    image: postgres:16-trixie
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
        - POSTGRES_PASSWORD=balda
        - POSTGRES_USER=balda
        - POSTGRES_DB=balda
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U balda -d balda"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-trixie
    ports:
      - "127.0.0.1:6379:6379"

  centrifugo:
    image: centrifugo/centrifugo:v6
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      CENTRIFUGO_CLIENT_TOKEN_HMAC_SECRET_KEY: "balda-centrifugo-secret"
      CENTRIFUGO_HTTP_API_KEY: "balda-centrifugo-api-key"
      CENTRIFUGO_CLIENT_ALLOWED_ORIGINS: "*"
      CENTRIFUGO_HEALTH_ENABLED: "true"
      CENTRIFUGO_CHANNEL_NAMESPACES: '[{"name":"game"}]'
    command: centrifugo

volumes:
  pg_data:
